<!DOCTYPE html>

    <title>Mini Project: Flex Gallery + Nav</title>
    <style>
/* Default (light) theme variables */
:root {
  --bg-color: #ffffff;
  --text-color: #000000;
}

/* Dark theme variables when the checkbox is checked */
:has(#theme-toggle:checked) {
  --bg-color: #000000;
  --text-color: #ffffff;
}

/* Apply variables to elements */
body {
  background-color: var(--bg-color);
  color: var(--text-color);
  transition: background-color 0.3s, color 0.3s;
}

    /*Section 1 — Navigation Bar: */
    .navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background-color: #4337de;
  color: white;

  }
}


.navbar__logo {
  font-size: 24px;
  font-weight: bold;
}

.navbar__links {
  display: flex;
  gap: 25px;
}

.navbar__links a {
  color: white;
  text-decoration: none;
  font-weight: 500;
}

.navbar__links a:hover {
  text-decoration: underline;
}
    
 /*Section 2 — Responsive Card Gallery: */
.gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  padding: 40px;
  /*background-color: #f7f7f7;*/
}

.card {
  /*background-color: white;*/
  /*background-color: (var(--bg-color)+white);*/
  background-color: wheat;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
 width: 250px;
   /* width: 30%;*/
  text-align: center;
  padding: 20px;
  /*Add the transition time for 
    hover effect on each card using
    transform: scale(1.05):*/
  transition: transform 0.3s; /* Smooth transition for the scaling effect */
}
  /*
.card:hover {
    transform: scale(1.05); /* Scale the card up slightly on hover */
/*Placing the transformation here causes 
    the image to be bigger than the card*/
.card img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 15px;
}
    
/*A button under each project description:*/
.project-button {
    padding: 10px 15px; /* Add some padding for a better look */
    background-color: #007BFF; /* A nice blue color */
    color: white; /* Text color */
    border: none; /* Remove default border */
    border-radius: 5px; /* Rounded corners */
    cursor: pointer; /* Change cursor to pointer on hover */
    transition: background-color 0.3s; /* Smooth transition for hover effect */
}

.project-button:hover {
    background-color: #0056b3; /* Darker blue on hover */
}

/*hover effect on each card using
    transform: scale(1.05):*/
.card:hover {
    transform: scale(1.05); /* Scale the card up slightly on hover */

    
 </style>
