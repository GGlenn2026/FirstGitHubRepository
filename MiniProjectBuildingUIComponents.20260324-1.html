<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project: Building UI Components</title>
    <style>
    /*Component 1 — Modal (Popup):*/
  .modal {
  /* make modal relative: */
/*  position: fixed; */
  position: relative;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
  z-index: 1000;
  }
  
  
  
  /* Component 2 — Tooltip: */
  .tooltip-container {
  position: relative;
  display: inline-block;
  margin-top: 20%;
  margin-left:  10%;
  background-color: blue;
}

.tooltip {
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background-color: black;
  color: white;
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
    .tooltip-container:hover 
  {
    /* Give the tooltip container 
    a slight transform: 
  translateY(-7px) on hover 
    for motion.: */
    transform: translateY(-7px);
    #btnHoverMe {
    /* background-color: #9999ff;  */ /* Using a hexadecimal color code */
    background-color: aqua;
  }
  /* background-color: green; */
  .tooltip {
  opacity: 1;
    /* Give the tooltip a slight transform: 
  translateY(-5px) on hover 
    for motion.: */
      transform: translateY(-5px);
   /* background-color: green; */
}
  }
 /* Give the tooltip a slight transform: 
  translateY(-5px) on hover 
    for motion.: 
  .tooltip:hover {
  transform: translateY(-5px);
 } 
  */
  
  /* Component 3 — Interactive Menu: */
  .menu {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: #f5f5f5;
  padding: 20px;
}

.menu a {
  position: relative;
  text-decoration: none;
  color: #333;
  font-weight: 600;
}

.menu a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -5px;
  width: 0%;
  height: 2px;
  background: #333;
  transition: width 0.3s ease;
}

.menu a:hover::after {
  width: 100%;
}
    /*Add an active state for 
  the selected menu link.: */
  .menu a:active {
  background-color: aqua;
}
  
/* Add a dark overlay behind 
your modal using another <div> with 
lower z-index.: */
  
  .overlay {
  position: absolute;
  
  top: 0;
  left: 0;
  
  /*
  top: 50%;
  left: 50%;
  */
  background-color: 
  rgba(60, 20, 255, 0.9);
  color: white;
  padding: 10px;
  z-index: 900;
  
  /*Bonus Add-On:
Want to make it feel even more real?
Add a dark overlay behind 
your modal using another <div> with 
lower z-index.
Add a fade-in effect with 
  opacity and transition.
Give the tooltip a slight transform: 
  translateY(-5px) on hover for motion.
Add an active state for 
  the selected menu link.
  */
</style>
<script>

</script>
</head>
<body>
<header>
 <h1>Welcome to Mini Project: Building UI Components</h1>
</header>
<main>
  <!-- Component 1 — Modal (Popup): -->
  
  <div class="modal">
  <h2>Welcome!</h2>
  <p>This is your first modal window.</p>
  <button>Close</button>
</div> 
   <!-- Add a dark overlay behind 
your modal using another <div> with 
lower z-index. -->
   <div class="overlay">I'm supposed 
    to be behind the modal</div> 
  
  <!-- Component 2 — Tooltip: -->
  <div class="tooltip-container">
  <button id = "btnHoverMe">Hover me</button>
  <span class="tooltip">I’m a tooltip!</span>
</div>
  
<!-- Component 3 — Interactive Menu: -->
  <nav class="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>
  
</main>

<script></script>

<footer>
  <p>© 2026 Mini Project: Building UI Components</p>
</footer>
</body>
</html>
