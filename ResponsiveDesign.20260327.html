<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <style>
    .container {
  display: flex;
  gap: 20px;
}

.card {
  width: 33.33%;
  padding: 20px;
  background-color: #f9f9f9;
  border: 2px solid #ddd;
  border-radius: 10px;
  box-sizing: border-box;
}

/* Tablet */
@media (max-width: 768px) {
  .card {
    width: 50%;
  }
}

/* Mobile */
@media (max-width: 480px) {
  .container {
    flex-direction: column;
  }

  .card {
    width: 100%;
  }
}
</style>
<script></script>
</head>
<body>
<header>
 <h1>Welcome to Responsive Design</h1>
</header>
<main>
<div class="container">
  <div class="card">
    <h3>Card One</h3>
    <p>This card adjusts based on screen size.</p>
  </div>

  <div class="card">
    <h3>Card Two</h3>
    <p>Try resizing the browser window.</p>
  </div>

  <div class="card">
    <h3>Card Three</h3>
    <p>Responsive design in action.</p>
  </div>
</div>
</main>

<script></script>

<footer>
  <p>© 2026 Responsive Design</p>
</footer>
</body>
</html>
